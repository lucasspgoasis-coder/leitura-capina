<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Capina - SPG Oásis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bibliotecas para Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .header-bg { background: linear-gradient(135deg, #065f46 0%, #043d2d 100%); border-bottom: 4px solid #022c20; }
        
        .input-group-icon { position: relative; }
        .input-group-icon i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; }
        .input-group-icon input, .input-group-icon select { padding-left: 46px !important; }
        
        .card-base { border-radius: 1.25rem; background: #ffffff; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        
        #toast {
            visibility: hidden; min-width: 280px; background-color: #065f46; color: #fff; text-align: center;
            border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        /* Modal de Confirmação */
        #modalConfirm { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 1.5rem; padding: 2rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #captureArea { background-color: #f8fafc; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <div id="toast">✅ Registro enviado para a Planilha!</div>

    <!-- MODAL DE CONFIRMAÇÃO -->
    <div id="modalConfirm">
        <div class="modal-content">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-check text-2xl"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Conferiu tudo?</h3>
            <p class="text-slate-500 mb-8 font-medium italic">"Ao confirmar, os dados serão enviados automaticamente para a planilha de controle."</p>
            
            <div class="flex flex-col space-y-3">
                <button id="confirmBtn" onclick="confirmarEnvio()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-emerald-800 transition-all">
                    Sim, Enviar Agora
                </button>
                <button onclick="closeModal()" class="w-full py-3 text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">
                    Não, Corrigir Dados
                </button>
            </div>
        </div>
    </div>

    <header class="header-bg text-white shadow-2xl mb-8">
        <div class="max-w-[1200px] mx-auto px-6 py-6">
            <div class="flex justify-between items-center">
                <div class="flex-grow">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-leaf text-emerald-400 text-2xl"></i>
                        <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Acompanhamento de Capina</h1>
                    </div>
                    <h2 class="text-sm font-medium text-emerald-100/70 mt-1 uppercase tracking-wider">Oásis • Lançamento Automático</h2>
                </div>
                <img src="https://i.imgur.com/rB1Lk8y.png" alt="Logo" class="w-16 h-16 object-contain">
            </div>
        </div>
    </header>

    <div class="max-w-[1200px] mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORMULÁRIO -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-[1.5rem] p-6 border border-slate-200 shadow-sm sticky top-6">
                    <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-6">Nova Atividade</h2>
                    
                    <form id="capinaForm" class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Data</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-calendar"></i>
                                    <input type="date" id="data" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm outline-none focus:border-emerald-500">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Turno</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-sun"></i>
                                    <select id="periodo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm bg-white outline-none">
                                        <option value="MANHÃ">MANHÃ</option>
                                        <option value="TARDE">TARDE</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Operador</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-user"></i>
                                    <select id="operador" required onchange="toggleOutroOperador()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="EDUARDO">EDUARDO</option>
                                        <option value="MESSIAS">MESSIAS</option>
                                        <option value="OUTRO">OUTRO (DIGITAR)</option>
                                    </select>
                                </div>
                                <input type="text" id="operadorOutro" placeholder="Nome completo" class="hidden mt-2 w-full px-4 py-2 rounded-lg border border-emerald-200 bg-emerald-50 font-bold text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Ferramenta</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-tools"></i>
                                    <select id="equipamento" required onchange="toggleOutroEquipamento()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="ROÇADEIRA">ROÇADEIRA</option>
                                        <option value="ENXADA">ENXADA</option>
                                        <option value="FACA">FACA</option>
                                        <option value="OUTROS">OUTROS</option>
                                    </select>
                                </div>
                                <input type="text" id="equipamentoOutro" placeholder="Qual ferramenta?" class="hidden mt-2 w-full px-4 py-2 rounded-lg border border-emerald-200 bg-emerald-50 font-bold text-sm outline-none">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Local / Bloco</label>
                            <div class="input-group-icon">
                                <i class="fas fa-map-pin"></i>
                                <select id="bloco" required onchange="toggleOutroBloco()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                    <option value="" disabled selected>SELECIONE O BLOCO</option>
                                    <option value="BLOCO 01">BLOCO 01</option>
                                    <option value="BLOCO 02">BLOCO 02</option>
                                    <option value="BLOCO 03">BLOCO 03</option>
                                    <option value="BLOCO 04">BLOCO 04</option>
                                    <option value="BLOCO 05">BLOCO 05</option>
                                    <option value="BLOCO 06">BLOCO 06</option>
                                    <option value="BLOCO 07">BLOCO 07</option>
                                    <option value="BLOCO 08">BLOCO 08</option>
                                    <option value="BLOCO 09">BLOCO 09</option>
                                    <option value="BLOCO 10">BLOCO 10</option>
                                    <option value="BLOCO 11">BLOCO 11</option>
                                    <option value="BLOCO 12">BLOCO 12</option>
                                    <option value="BLOCO 13">BLOCO 13</option>
                                    <option value="BLOCO 14">BLOCO 14</option>
                                    <option value="OUTRO">OUTRO (DIGITAR)</option>
                                </select>
                            </div>
                            <input type="text" id="blocoOutro" placeholder="Digite o local/bloco" class="hidden mt-2 w-full px-4 py-2 rounded-lg border border-emerald-200 bg-emerald-50 font-bold text-sm outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Início</label>
                                <input type="time" id="horaInicio" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Término</label>
                                <input type="time" id="horaFim" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm">
                            </div>
                        </div>

                        <button type="button" onclick="perguntarAntesDeEnviar()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-emerald-800 transition-all flex items-center justify-center space-x-2">
                            <i class="fas fa-cloud-upload-alt"></i><span>Registrar e Enviar</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- HISTÓRICO -->
            <div class="lg:col-span-7">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Registros de Hoje</h3>
                    <button onclick="exportarImagem()" class="text-emerald-700 text-xs font-bold flex items-center bg-emerald-50 px-3 py-2 rounded-lg hover:bg-emerald-100 transition-all">
                        <i class="fas fa-camera mr-2"></i> Foto do Resumo
                    </button>
                </div>

                <div id="captureArea">
                    <div id="cardsGrid" class="space-y-3"></div>
                    <div id="emptyState" class="text-center py-16 bg-white rounded-2xl border border-slate-100">
                        <p class="text-slate-400 text-sm font-medium italic">Nenhum registro enviado nesta sessão.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // URL da sua planilha Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLsZNqWAJKcUWI5O2xt_OFhB3TLZBDWGfow0WU90I_xBh-9VbJ2M_Stz_LZpBYzbjSHA/exec";
        
        let registros = [];
        let pendente = null;

        function toggleOutroOperador() {
            const val = document.getElementById('operador').value;
            document.getElementById('operadorOutro').classList.toggle('hidden', val !== 'OUTRO');
        }

        function toggleOutroEquipamento() {
            const val = document.getElementById('equipamento').value;
            document.getElementById('equipamentoOutro').classList.toggle('hidden', val !== 'OUTROS');
        }

        function toggleOutroBloco() {
            const val = document.getElementById('bloco').value;
            document.getElementById('blocoOutro').classList.toggle('hidden', val !== 'OUTRO');
        }

        function perguntarAntesDeEnviar() {
            const form = document.getElementById('capinaForm');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const hI = document.getElementById('horaInicio').value;
            const hF = document.getElementById('horaFim').value;
            const s = hI.split(':'), e = hF.split(':');
            const total = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));

            // Tratamento de campos "Outro"
            const opSel = document.getElementById('operador').value;
            const opFinal = opSel === 'OUTRO' ? document.getElementById('operadorOutro').value.toUpperCase() : opSel;

            const eqSel = document.getElementById('equipamento').value;
            const eqFinal = eqSel === 'OUTROS' ? document.getElementById('equipamentoOutro').value.toUpperCase() : eqSel;

            const blSel = document.getElementById('bloco').value;
            const blFinal = blSel === 'OUTRO' ? document.getElementById('blocoOutro').value.toUpperCase() : blSel;

            // Prepara o objeto para a planilha
            pendente = {
                data: document.getElementById('data').value.split('-').reverse().join('/'),
                periodo: document.getElementById('periodo').value,
                operador: opFinal,
                bloco: blFinal,
                equip: eqFinal,
                horaInicio: hI,
                horaFim: hF,
                minutos: total,
                status: "OK"
            };

            document.getElementById('modalConfirm').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalConfirm').style.display = 'none';
            pendente = null;
        }

        async function confirmarEnvio() {
            if(!pendente) return;
            const btn = document.getElementById('confirmBtn');
            const original = btn.innerHTML;

            try {
                btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>ENVIANDO PARA PLANILHA...`;
                btn.disabled = true;

                // ENVIO AUTOMÁTICO PARA A PLANILHA
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pendente)
                });

                showToast();
                registros.unshift({...pendente}); // Adiciona no histórico visual
                render();
                
                document.getElementById('capinaForm').reset();
                toggleOutroOperador();
                toggleOutroEquipamento();
                toggleOutroBloco();
                initDate();
                closeModal();

            } catch (err) {
                alert("Erro ao enviar para a planilha. Verifique a internet.");
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const empty = document.getElementById('emptyState');
            if(registros.length > 0) empty.classList.add('hidden');
            
            grid.innerHTML = registros.map(r => `
                <div class="card-base p-4 border-l-4 border-emerald-600 bg-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="flex items-center space-x-2 text-[10px] font-bold text-slate-400 uppercase mb-1">
                                <span>${r.data}</span>
                                <span>•</span>
                                <span class="text-emerald-600">${r.periodo}</span>
                            </div>
                            <h4 class="font-black text-slate-800 uppercase tracking-tight">${r.operador}</h4>
                            <p class="text-xs font-bold text-slate-500">
                                ${r.bloco} | ${r.equip}
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-700">${r.horaInicio} - ${r.horaFim}</p>
                            <p class="text-[9px] font-black text-emerald-500 uppercase mt-1 tracking-tighter">Planilha OK <i class="fas fa-check"></i></p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function exportarImagem() {
            if (registros.length === 0) return;
            const capture = document.getElementById('captureArea');
            const canvas = await html2canvas(capture, { scale: 2, backgroundColor: '#f8fafc' });
            const link = document.createElement('a');
            link.download = `capina-oasis-resumo.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        function showToast() {
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        function initDate() {
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
        }

        initDate();
    </script>
</body>
</html>
