<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Capina - SPG Oásis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bibliotecas para Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .header-bg { background: linear-gradient(135deg, #065f46 0%, #043d2d 100%); border-bottom: 4px solid #022c20; }
        
        .input-group-icon { position: relative; }
        .input-group-icon i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; }
        .input-group-icon input, .input-group-icon select { padding-left: 46px !important; }
        
        .card-base { border-radius: 1.5rem; background: #ffffff; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        
        #toast {
            visibility: hidden; min-width: 280px; background-color: #065f46; color: #fff; text-align: center;
            border-radius: 12px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        /* Modal Checklist */
        #modalChecklist { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 2rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #captureArea { background-color: #f0f4f8; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <div id="toast">✅ Enviado com sucesso para a Planilha!</div>

    <!-- MODAL CHECKLIST -->
    <div id="modalChecklist">
        <div class="modal-content">
            <div class="flex items-center space-x-3 mb-6">
                <div class="bg-amber-100 p-2 rounded-lg text-amber-600">
                    <i class="fas fa-clipboard-check text-xl"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Checklist de Segurança</h3>
            </div>
            
            <p class="text-sm text-slate-500 mb-6 font-medium">Confirme os itens abaixo antes de finalizar o envio:</p>
            
            <div class="space-y-4 mb-8">
                <label class="flex items-center p-3 rounded-xl border border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="checklist-item w-5 h-5 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="ml-3 text-sm font-bold text-slate-700">EPIs completos e em bom estado</span>
                </label>
                <label class="flex items-center p-3 rounded-xl border border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="checklist-item w-5 h-5 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="ml-3 text-sm font-bold text-slate-700">Equipamento/Ferramenta conferida</span>
                </label>
                <label class="flex items-center p-3 rounded-xl border border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors">
                    <input type="checkbox" class="checklist-item w-5 h-5 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    <span class="ml-3 text-sm font-bold text-slate-700">Área de trabalho sinalizada/segura</span>
                </label>
            </div>

            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">Cancelar</button>
                <button id="confirmBtn" onclick="confirmarEnvio()" class="flex-[2] bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-emerald-800 transition-all opacity-50 cursor-not-allowed" disabled>
                    Finalizar e Enviar
                </button>
            </div>
        </div>
    </div>

    <header class="header-bg text-white shadow-2xl mb-8">
        <div class="max-w-[1400px] mx-auto px-6 py-6">
            <div class="flex justify-between items-center">
                <div class="flex-grow">
                    <div class="flex items-center space-x-3">
                        <div class="bg-emerald-500/20 p-2 rounded-lg">
                            <i class="fas fa-leaf text-emerald-400 text-2xl"></i>
                        </div>
                        <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Acompanhamento de Capina</h1>
                    </div>
                    <h2 class="text-lg font-medium text-emerald-100/80 mt-1">Oásis • Controle Diário de Atividades</h2>
                </div>
                <img src="https://i.imgur.com/rB1Lk8y.png" alt="Logo" class="w-20 h-20 object-contain">
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-4 md:px-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Formulário -->
            <div class="lg:col-span-4">
                <div class="bg-white rounded-[1.5rem] p-6 border border-slate-200 shadow-xl sticky top-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-black text-slate-800 uppercase tracking-tight">Lançar Atividade</h2>
                        <span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded-full">Automático</span>
                    </div>
                    
                    <form id="rocadeiraForm" class="space-y-5">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Data</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-calendar-alt"></i>
                                    <input type="date" id="data" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm outline-none focus:border-emerald-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Período</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-clock"></i>
                                    <select id="periodo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm bg-white outline-none">
                                        <option value="MANHÃ">MANHÃ</option>
                                        <option value="TARDE">TARDE</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Operador</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-user"></i>
                                    <select id="operador" required onchange="toggleOutroOperador()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="EDUARDO">EDUARDO</option>
                                        <option value="MESSIAS">MESSIAS</option>
                                        <option value="OUTRO">OUTRO</option>
                                    </select>
                                </div>
                                <input type="text" id="operadorOutro" placeholder="Nome do operador?" class="hidden mt-2 w-full px-4 py-2 rounded-lg border border-slate-200 font-bold text-sm outline-none focus:border-emerald-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Equipamento</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-tools"></i>
                                    <select id="equipamento" required onchange="toggleOutroEquipamento()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="ROÇADEIRA">ROÇADEIRA</option>
                                        <option value="ENXADA">ENXADA</option>
                                        <option value="FACA">FACA</option>
                                        <option value="OUTROS">OUTROS</option>
                                    </select>
                                </div>
                                <input type="text" id="equipamentoOutro" placeholder="Qual ferramenta?" class="hidden mt-2 w-full px-4 py-2 rounded-lg border border-slate-200 font-bold text-sm outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Bloco / Local</label>
                            <div class="input-group-icon">
                                <i class="fas fa-map-marker-alt"></i>
                                <input type="text" id="bloco" required placeholder="Ex: BLOCO 01" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm uppercase">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Início</label>
                                <input type="time" id="horaInicio" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Fim</label>
                                <input type="time" id="horaFim" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm">
                            </div>
                        </div>

                        <button type="button" onclick="abrirChecklist()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-emerald-800 transition-all flex items-center justify-center space-x-2">
                            <i class="fas fa-paper-plane"></i><span>Enviar para Planilha</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Listagem e Histórico Local -->
            <div class="lg:col-span-8">
                <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                    <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">Histórico de Capina</h3>
                    <div class="flex space-x-3">
                        <button onclick="exportarImagem()" class="bg-white text-emerald-700 border border-emerald-200 px-4 py-2 rounded-xl text-xs font-bold flex items-center hover:bg-emerald-50 transition-colors">
                            <i class="fas fa-camera mr-2"></i> Baixar JPEG
                        </button>
                        <button onclick="exportarExcel()" class="bg-white text-emerald-700 border border-emerald-200 px-4 py-2 rounded-xl text-xs font-bold flex items-center hover:bg-emerald-50 transition-colors">
                            <i class="fas fa-file-excel mr-2"></i> Backup Excel
                        </button>
                    </div>
                </div>

                <div id="captureArea">
                    <div id="cardsGrid" class="grid grid-cols-1 gap-4"></div>
                    <div id="emptyState" class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 font-medium">Nenhum registro para esta sessão.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLsZNqWAJKcUWI5O2xt_OFhB3TLZBDWGfow0WU90I_xBh-9VbJ2M_Stz_LZpBYzbjSHA/exec";
        let registros = [];
        let dadosPendentes = null;

        // Monitorar checkboxes do checklist
        document.querySelectorAll('.checklist-item').forEach(el => {
            el.addEventListener('change', () => {
                const todosMarcados = [...document.querySelectorAll('.checklist-item')].every(item => item.checked);
                const btn = document.getElementById('confirmBtn');
                btn.disabled = !todosMarcados;
                if(todosMarcados) {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            });
        });

        function abrirChecklist() {
            const form = document.getElementById('rocadeiraForm');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            // Preparar os dados
            const hInicio = document.getElementById('horaInicio').value;
            const hFim = document.getElementById('horaFim').value;
            const s = hInicio.split(':'), e_t = hFim.split(':');
            const minTotal = (parseInt(e_t[0])*60 + parseInt(e_t[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
            const opSelect = document.getElementById('operador').value;
            const opFinal = opSelect === 'OUTRO' ? document.getElementById('operadorOutro').value.toUpperCase() : opSelect;
            const equipSelect = document.getElementById('equipamento').value;
            const equipFinal = equipSelect === 'OUTROS' ? document.getElementById('equipamentoOutro').value.toUpperCase() : equipSelect;

            dadosPendentes = {
                data: document.getElementById('data').value.split('-').reverse().join('/'),
                periodo: document.getElementById('periodo').value,
                operador: opFinal,
                bloco: document.getElementById('bloco').value.toUpperCase(),
                equip: equipFinal,
                horaInicio: hInicio,
                horaFim: hFim,
                minutos: minTotal,
                status: "OK"
            };

            document.getElementById('modalChecklist').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalChecklist').style.display = 'none';
            document.querySelectorAll('.checklist-item').forEach(i => i.checked = false);
            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('confirmBtn').classList.add('opacity-50', 'cursor-not-allowed');
            dadosPendentes = null;
        }

        async function confirmarEnvio() {
            if(!dadosPendentes) return;

            const btn = document.getElementById('confirmBtn');
            const originalText = btn.innerHTML;

            try {
                btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i><span>ENVIANDO...</span>`;
                btn.disabled = true;

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosPendentes)
                });

                showToast();
                registros.unshift(dadosPendentes);
                render();
                
                document.getElementById('rocadeiraForm').reset();
                document.getElementById('operadorOutro').classList.add('hidden');
                document.getElementById('equipamentoOutro').classList.add('hidden');
                initDate();
                closeModal();

            } catch (error) {
                alert("Erro ao enviar. Verifique sua conexão.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function toggleOutroOperador() {
            const select = document.getElementById('operador');
            const outroInput = document.getElementById('operadorOutro');
            if (select.value === 'OUTRO') {
                outroInput.classList.remove('hidden');
                outroInput.required = true;
            } else {
                outroInput.classList.add('hidden');
                outroInput.required = false;
            }
        }

        function toggleOutroEquipamento() {
            const select = document.getElementById('equipamento');
            const outroInput = document.getElementById('equipamentoOutro');
            if (select.value === 'OUTROS') {
                outroInput.classList.remove('hidden');
                outroInput.required = true;
            } else {
                outroInput.classList.add('hidden');
                outroInput.required = false;
            }
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const empty = document.getElementById('emptyState');
            if(registros.length > 0) empty.classList.add('hidden');
            
            grid.innerHTML = registros.map(r => `
                <div class="card-base p-5 border-l-8 border-emerald-600 bg-white">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center space-x-2 mb-1">
                                <span class="bg-slate-100 text-slate-600 text-[10px] font-black px-2 py-0.5 rounded">${r.data}</span>
                                <span class="text-[10px] font-bold text-emerald-600 uppercase">${r.periodo}</span>
                            </div>
                            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">${r.operador}</h3>
                            <p class="text-sm font-bold text-slate-400 mt-1">
                                <i class="fas fa-map-marker-alt text-xs mr-1"></i>${r.bloco} 
                                <span class="mx-2 text-slate-200">|</span> 
                                <i class="fas fa-tools text-xs mr-1"></i>${r.equip}
                            </p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black text-slate-700">${r.horaInicio} <i class="fas fa-arrow-right text-[10px] mx-1 text-slate-300"></i> ${r.horaFim}</span>
                            <div class="flex items-center justify-end text-[10px] text-emerald-500 font-black uppercase mt-2">
                                <i class="fas fa-check-circle mr-1"></i> Sincronizado
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function exportarImagem() {
            if (registros.length === 0) return;
            const capture = document.getElementById('captureArea');
            const canvas = await html2canvas(capture, { scale: 2, backgroundColor: '#f0f4f8' });
            const link = document.createElement('a');
            link.download = `capina-oasis-${new Date().getTime()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        function exportarExcel() {
            if (registros.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(registros);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Dados");
            XLSX.writeFile(wb, "historico_capina.xlsx");
        }

        function showToast() {
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

        function initDate() {
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
        }

        initDate();
    </script>
</body>
</html>
